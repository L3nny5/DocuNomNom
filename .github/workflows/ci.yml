name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint, types, imports, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend (with dev extras)
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy

      - name: Import-linter (hexagonal boundaries)
        run: lint-imports

      - name: Pytest
        run: pytest

  frontend:
    name: Frontend (typecheck, format, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Prettier check
        run: npm run format

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  docker-image:
    name: Docker image (build, smoke-test & push)
    runs-on: ubuntu-latest
    # Only build the image once the Python and JS surfaces are green:
    # the Dockerfile wraps both of them, so there's no point racing ahead.
    needs: [backend, frontend]
    # `contents: read` for the checkout, `packages: write` so the job can
    # push to ghcr.io/<owner>/docunomnom using the ambient GITHUB_TOKEN.
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pull-request builds stay local to this runner; only pushes to
      # main / tags get to authenticate against GHCR.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag policy:
      #   - every build gets a ``sha-<short>`` tag (immutable, good for rollbacks).
      #   - branch builds on main also get a ``main`` tag.
      #   - ``latest`` is only applied on an actual push to main (not PRs).
      #   - Git tags shaped ``vMAJOR.MINOR.PATCH`` produce ``1.2.3`` and ``1.2``.
      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}

      # First build loads the resulting image into the runner's local
      # docker so the smoke-test step can ``docker run`` it. Single
      # platform (linux/amd64) keeps this under ~5-8 minutes incl.
      # OCRmyPDF + Tesseract.
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke test: import the package, make sure the entrypoints that
      # the container actually runs (worker, API factory, DB bootstrap)
      # are wired and that Alembic resolves the packaged migrations tree
      # without an external alembic.ini. We bypass ``entrypoint.sh`` with
      # ``--entrypoint python`` so the test is hermetic and does not
      # touch bind-mount semantics.
      - name: Smoke-test the built image
        run: |
          set -euo pipefail
          IMAGE="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n1)"
          echo "Smoke-testing ${IMAGE}"
          docker run --rm --entrypoint python "${IMAGE}" - <<'PY'
          import docunomnom
          import docunomnom.api.main as api_main
          import docunomnom.worker.main as worker_main
          from docunomnom.storage.db import run_alembic_upgrade
          from docunomnom.storage.db.bootstrap import _packaged_migrations_dir
          assert callable(api_main.create_app)
          assert callable(worker_main.main)
          assert callable(run_alembic_upgrade)
          migrations = _packaged_migrations_dir()
          assert (migrations / "env.py").is_file(), "env.py missing in image"
          assert any(migrations.joinpath("versions").glob("*.py")), "no versions shipped"
          # The image must expose ocrmypdf to the same interpreter that
          # runs the worker. Regression guard for the Debian-vs-Python
          # version mismatch that shipped an unusable OCRmyPDF backend
          # to production until v1.0.x.
          import ocrmypdf
          assert hasattr(ocrmypdf, "ocr"), "ocrmypdf.ocr not exposed"
          print(f"docunomnom smoke OK; migrations at {migrations}; ocrmypdf={ocrmypdf.__version__}")
          PY
          # Also confirm the OCRmyPDF runtime binaries are wired.
          docker run --rm --entrypoint ocrmypdf "${IMAGE}" --version >/dev/null

      # Second build (push=true) reuses the layer cache from the build
      # step, so this step is effectively a registry upload. Skipped on
      # pull requests.
      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
